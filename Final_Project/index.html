<!-- ### Final Project (ties everything together)
Build a **"Interactive Task Board"** from scratch using only what you've learned across all 15 days:
- Variables, functions, arrays, and loops to manage the task data.
- `map`/`filter`/`reduce` to compute stats (e.g., "3 of 5 tasks completed").
- DOM manipulation to render tasks dynamically.
- Event listeners for add/complete/delete actions.
- `setTimeout` for a temporary "Task added!" confirmation message that disappears after 2 seconds.
- Hover/click animations using `transform` and `transition`.
- A custom cursor on the board area for extra polish.

If you can build this without referring back to earlier days, you're in good shape — this project alone touches nearly every topic on your list. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Task Board</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cursor"></div>

<div class="container">

    <h1>📝 Interactive Task Board</h1>

    <input
        type="text"
        id="taskInput"
        placeholder="Enter a task">

    <button id="addBtn">Add Task</button>

    <p id="message"></p>

    <h3 id="stats">0 of 0 tasks completed</h3>
    
    <p id="taskCount"></p>
    <p id="charCount"></p>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
